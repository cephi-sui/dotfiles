# https://wiki.hyprland.org/Configuring/Keywords/#blurring-layersurfaces
# https://wiki.hyprland.org/Configuring/Window-Rules/
# https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.4, match:namespace waybar # Avoid blurring invisible parts of Waybar.

# Fuzzel
layerrule = blur on, match:namespace launcher # Fuzzel's layer name is launcher.
layerrule = ignore_alpha 0.4, match:namespace launcher # Avoid blurring invisible parts of Fuzzel.

# Dunst
layerrule = blur on, match:namespace notifications # Dunst's layer name is launcher.
layerrule = ignore_alpha 0.4, match:namespace notifications # Avoid blurring invisible parts of Dunst.

###############
### WINDOWS ###
###############

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps.
#windowrulev2 = suppressevent maximize, class:.*
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland.
#windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
#windowrule = match:class ^

# Discord
#windowrulev2 = workspace special silent, class:^(discord)$
#windowrule = match:class ^(discord)$, workspace special silent

# Nextcloud
#windowrulev2 = float, class:com.nextcloud.desktopclient.nextcloud
#windowrulev2 = move onscreen cursor 0 0, class:com.nextcloud.desktopclient.nextcloud
windowrule = match:class com.nextcloud.desktopclient.nextcloud, float on
windowrule = match:class com.nextcloud.desktopclient.nextcloud, move onscreen cursor 0 0

# Steam
#windowrulev2 = workspace 8, class:^(steam)$, title: Steam
#windowrulev2 = monitor $scndMoni, class:^(steam)$, title: (Friends List)
#windowrulev2 = noblur, class:^(steam)$

